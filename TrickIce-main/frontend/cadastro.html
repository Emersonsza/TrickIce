<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>TrickIce Cadastro</title>
</head>

<body>
    <main class="container">
        <form action="login.html">
            <h1>Cadrasto TrickIce</h1>

            <div class="input-box">
                <input placeholder="Email" type="email" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Criar senha" type="password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="input-box">
                <input placeholder="Confirmar senha" type="password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar a senha
                </label>
                
            </div>

            <button type="submit" class="login">
                Cadastro
            </button>

            <div class="register-link">
                <p>Já tenho uma conta <a href="./login.html">Login</a></p>
            </div>

        </form>
    </main>

</body>

</html>
