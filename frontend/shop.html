<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Trickice</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navigation">
        <div class="nav-container">
            <a href="index.html" class="logo">Trickice</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">LOJA</a></li>
                <li><a href="tutorial.html">VER MAIS</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="tutorial.html">Learn</a>
    </div>

    <!-- Shop Hero -->
    <section class="shop-hero">
        <div class="hero-content">
            <a href="index.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </a>
            <h1 class="hero-title">Shop</h1>
            <p class="subtitle" style="margin-top: 2rem;">Underground essentials</p>
        </div>
    </section>

    <!-- Product Categories -->
    <section class="section">
        <div class="category-filters">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="skateboard">Skateboards</button>
            <button class="category-btn" data-category="streetwear">Streetwear</button>
            <button class="category-btn" data-category="footwear">Footwear</button>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="section">
        <div class="grid-3" id="shopProductGrid">
            <!-- Products will be loaded dynamically -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-copyright">© 2026 Trickice. Underground since day one.</p>
        <div class="footer-logo">Trickice</div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Load all products for shop page
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('shopProductGrid');
            
            try {
                const products = await API.getProducts();
                renderProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Failed to load products</p>';
            }

            // Category filters
            const categoryButtons = document.querySelectorAll('.category-btn');
            categoryButtons.forEach(btn => {
                btn.addEventListener('click', async () => {
                    categoryButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const category = btn.dataset.category;
                    try {
                        const products = category === 'all' 
                            ? await API.getProducts()
                            : await API.getProductsByCategory(category);
                        renderProducts(products);
                    } catch (error) {
                        console.error('Error filtering products:', error);
                    }
                });
            });
        });

        function renderProducts(products) {
            const grid = document.getElementById('shopProductGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card fade-in">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <p class="product-category">${product.category}</p>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">$${product.price}</p>
                    </div>
                </div>
            `).join('');

            // Reinitialize scroll observer
            initScrollAnimations();
        }
    </script>
</body>
</html>
