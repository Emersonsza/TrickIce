<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Cadastro Trick Ice</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="caixa-formulario login">
            <form action="./index.html">
                <h1>Login</h1>
                <div class="caixa-entrada">
                    <input type="text" placeholder="Usuário" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="caixa-entrada">
                    <input type="password" placeholder="Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="link-esquecido">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <div class="caixa-formulario registrar">
            <form action="./index.html">
                <h1>Registrar</h1>
                <div class="caixa-entrada">
                    <input type="text" placeholder="Usuário" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="caixa-entrada">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="caixa-entrada">
                    <input type="password" placeholder="Criar Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="caixa-entrada">
                    <input type="password" placeholder="Confirmar Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Registrar</button>
            </form>
        </div>

        <div class="caixa-alternancia">
            <div class="painel-alternancia alternancia-esquerda">
                <h1>Bem-vindo ao TrickIce!</h1>
                <p>Não tem uma conta?</p>
                <button class="btn registrar-btn">Registrar</button>
                <img src="imagens/polar.webp" class="imagem-mascote" alt="Urso Polar">
            </div>

            <div class="painel-alternancia alternancia-direita">
                <h1>Bem-vindo de volta ao TrickIce!</h1>
                <p>Já tem uma conta?</p>
                <button class="btn login-btn">Login</button>
                <img src="imagens/pinguim.gif" class="imagem-mascote" alt="Pinguim">
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>

</html>
